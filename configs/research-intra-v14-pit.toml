[account]
name = "intra-v14-pit-research"
credential_profile = "INTRADAY"
confirmation_env = "PROJECT_GELD_INTRADAY_CONFIRM_PAPER"

[universe]
symbols = []
symbols_file = "../universes/pit-liquid-100-monthly-2019-2026.csv.gz"
benchmark = "SPY"

[data]
feed = "iex"
adjustment = "all"
cache_dir = "data/cache/intraday-v14-pit"

[strategy]
name = "intra_v14"

[strategy.parameters]
benchmark_symbol = "SPY"
lookback_bars = 3
names_per_side = 4
gross_exposure = 0.80
max_position_weight = 0.10
min_cumulative_dollar_volume = 20000000.0
min_absolute_score = 0.0
signal_time = "10:30"
flatten_at = "15:45"
direction = "momentum"
timezone = "America/New_York"

[intraday]
bar_minutes = 15
lookback_days = 90
state_file = "artifacts/research-intra-v14-pit/cycle_state.json"

[backtest]
initial_cash = 100000.0
slippage_bps = 8.0
commission_per_share = 0.0
allow_fractional = true
rebalance_every = 1
missing_price_exit_sessions = 2
missing_price_haircut_pct = 0.05
force_flat_at_session_end = true
session_timezone = "America/New_York"
allow_short = true

[risk]
max_gross_exposure = 0.80
max_position_weight = 0.10
max_order_notional = 1000000000.0
max_order_pct_equity = 0.10
min_trade_notional = 25.0
min_trade_pct_equity = 0.005
max_daily_loss_pct = 0.01

[paper]
enabled = false
allow_short = true
require_easy_to_borrow = true
lookback_days = 90
client_order_prefix = "geldiv14"
rebalance_every_sessions = 1
state_file = "artifacts/research-intra-v14-pit/unused-daily-state.json"
cash_buffer_pct = 0.01
max_universe_age_days = 45
execution_style = "marketable_limit"
limit_offset_bps = 2.0
