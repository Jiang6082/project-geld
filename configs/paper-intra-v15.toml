[account]
name = "intra-v15-paper"
credential_profile = "INTRADAY"
confirmation_env = "PROJECT_GELD_INTRADAY_CONFIRM_PAPER"

[universe]
symbols = []
symbols_file = "../universes/pit-liquid-100-monthly-2019-2026.csv.gz"
benchmark = "SPY"

[data]
feed = "iex"
adjustment = "all"
cache_dir = "data/cache/intraday-v13-paper-iex"

[strategy]
name = "intra_v15"

[strategy.parameters]
benchmark_symbol = "SPY"
lookback_bars = 2
top_n = 4
gross_exposure = 0.40
max_position_weight = 0.10
min_bar_dollar_volume = 1000000.0
min_relative_dislocation = 0.01
signal_time = "10:30"
confirmation_bars = 1
flatten_at = "15:45"
require_benchmark_above_vwap = true
daily_trend_sessions = 20
require_below_prior_close = true
relative_volume_sessions = 20
min_relative_volume = 0.0
max_relative_volume = 1.5
min_confirmation_break = 0.0025
daily_volatility_sessions = 20
max_annualized_daily_volatility = 1.50
min_market_breadth = 0.45
correlation_lookback_sessions = 60
max_pairwise_correlation = 0.85
core_symbol = "SPY"
base_signal_time = "10:30"
base_flatten_at = "15:30"
base_long_weight = 0.05
base_short_weight = 0.025
base_min_signal_bps = 5.0
base_weak_weight = 0.005
# Continuous confidence sizing: ramp from the weak floor at 5 bps up to full
# weight at 15 bps instead of stepping straight to full. Exact IEX reproduction:
# total return 3.26% -> 3.45%, Sharpe 0.82 -> 0.88, lower turnover and drawdown,
# positive in every period.
base_saturation_bps = 15.0
# Trend/chop gate: only take the opening-trend sleeve when the morning's
# efficiency ratio (net move / summed path to 10:30) is >= 0.30, i.e. a genuinely
# trending morning. Exact IEX reproduction: total return 3.45% -> 3.89%, Sharpe
# 0.88 -> 1.00, lower turnover; improvement stable across 0.20-0.40.
base_min_efficiency_ratio = 0.30
timezone = "America/New_York"

[intraday]
bar_minutes = 15
lookback_days = 90
state_file = "artifacts/paper-intra-v15/cycle_state.json"

[backtest]
initial_cash = 100000.0
slippage_bps = 8.0
commission_per_share = 0.0
allow_fractional = true
rebalance_every = 1
missing_price_exit_sessions = 2
missing_price_haircut_pct = 0.05
force_flat_at_session_end = true
session_timezone = "America/New_York"
allow_short = true

[backtest.symbol_slippage_bps]
SPY = 2.0

[risk]
max_gross_exposure = 0.45
max_position_weight = 0.10
max_order_notional = 1000000000.0
max_order_pct_equity = 0.10
min_trade_notional = 25.0
# The 0.5% weak-signal base leg must clear the minimum-trade floor with margin,
# otherwise whole-share rounding suppresses it and the sleeve is less active than
# the backtest assumes. Keep this floor below base_weak_weight (0.005).
min_trade_pct_equity = 0.004
max_daily_loss_pct = 0.005

[paper]
enabled = true
allow_short = true
require_easy_to_borrow = true
lookback_days = 90
client_order_prefix = "geldiv15"
rebalance_every_sessions = 1
state_file = "artifacts/paper-intra-v15/unused-daily-state.json"
cash_buffer_pct = 0.01
max_universe_age_days = 45
execution_style = "marketable_limit"
limit_offset_bps = 2.0
stale_order_seconds = 300
market_exit_orders = true
