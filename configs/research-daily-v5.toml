[account]
name = "daily-v5-research"
credential_profile = "SWING"
confirmation_env = "PROJECT_GELD_SWING_CONFIRM_PAPER"

[universe]
symbols = []
symbols_file = "../artifacts/paper-v4-shadow/universe.csv"
benchmark = "SPY"

[data]
feed = "iex"
adjustment = "all"
cache_dir = "data/cache/swing"

[strategy]
name = "daily_v5"

[strategy.parameters]
core_symbol = "SPY"
core_weight = 0.40
active_weight = 0.60
active_name_cap = 0.03
no_trade_band = 0.004
rebalance_every = 21
core_trend_window = 200
core_volatility_window = 20
core_target_volatility = 10.0
minimum_exposure_multiplier = 1.0
bearish_core_multiplier = 1.0
bearish_active_multiplier = 1.0

[strategy.parameters.active_parameters]
formation_lookback = 252
medium_lookback = 126
skip_recent = 21
beta_lookback = 126
volatility_lookback = 60
correlation_lookback = 126
fast_window = 50
slow_window = 200
max_symbols = 40
exit_rank = 80
maximum_annualized_volatility = 0.60
max_pairwise_correlation = 0.85
residual_factor_symbols = []
weighting_method = "benchmark_aware"
beta_penalty = 0.50
score_tilt_strength = 0.20

[backtest]
initial_cash = 100000.0
slippage_bps = 10.0
commission_per_share = 0.0
allow_fractional = true
rebalance_every = 21
missing_price_exit_sessions = 5
missing_price_haircut_pct = 0.0

[risk]
max_gross_exposure = 1.0
max_position_weight = 0.03
max_order_notional = 100000.0
max_order_pct_equity = 0.03
min_trade_notional = 10.0
max_daily_loss_pct = 0.02

[risk.symbol_position_weight_limits]
SPY = 0.40

[risk.symbol_order_notional_limits]
SPY = 1000000000.0

[risk.symbol_order_pct_equity_limits]
SPY = 0.40

[paper]
enabled = false
lookback_days = 800
client_order_prefix = "gelddv5"
rebalance_every_sessions = 21
state_file = "artifacts/research-daily-v5/rebalance_state.json"
cash_buffer_pct = 0.01
max_universe_age_days = 45
