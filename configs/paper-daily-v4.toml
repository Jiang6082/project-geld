[account]
name = "daily-v4"
credential_profile = "SWING"
confirmation_env = "PROJECT_GELD_SWING_CONFIRM_PAPER"

[universe]
symbols = []
symbols_file = "../artifacts/paper-v4-shadow/universe.csv"
benchmark = "SPY"

[data]
feed = "sip"
adjustment = "all"
cache_dir = "data/cache/swing-daily-v4-sip"

[strategy]
name = "daily_v4"

# Allocation note: 75% SPY core / 25% active sleeve, selected on PnL evidence.
# A full core/active spectrum reproduction (2017-2026) shows total return
# plateaus at ~300-304% for every active weight from 25% to 75%, while turnover
# climbs from ~1.7x (75/25) to ~4.2x (40/60) to ~5.2x (25/75). 75/25 therefore
# captures the maximum backtested PnL at the lowest turnover, which matters most
# given this strategy's documented cost sensitivity. This also matches the
# pre-registered MOMENTUM_V4 selection. See PAPER_DAILY_V4.md.
[strategy.parameters]
core_symbol = "SPY"
core_weight = 0.75
active_weight = 0.25
active_name_cap = 0.03
no_trade_band = 0.0025
rebalance_every = 21
# Regime-aware exposure control on the active sleeve. At 75/25 it slightly raises
# total return (302% -> 304%) and Sharpe while trimming bear-regime exposure, and
# stays positive in every sub-period.
regime_enabled = true

[strategy.parameters.active_parameters]
formation_lookback = 252
medium_lookback = 126
skip_recent = 21
beta_lookback = 126
volatility_lookback = 60
correlation_lookback = 126
fast_window = 50
slow_window = 200
max_symbols = 40
exit_rank = 80
maximum_annualized_volatility = 0.60
max_pairwise_correlation = 0.85
residual_factor_symbols = []
# Benchmark-aware weighting tilts toward stronger scores and penalizes beta far
# from 1. Full-sample reproduction: total return 304.3% -> 305.9% at identical
# drawdown and turnover, positive in every sub-period.
weighting_method = "benchmark_aware"

[backtest]
initial_cash = 100000.0
slippage_bps = 10.0
commission_per_share = 0.0
allow_fractional = true
rebalance_every = 21
missing_price_exit_sessions = 5
missing_price_haircut_pct = 0.0

[risk]
max_gross_exposure = 1.0
max_position_weight = 0.03
max_order_notional = 100000.0
max_order_pct_equity = 0.03
min_trade_notional = 10.0
max_daily_loss_pct = 0.02

[risk.symbol_position_weight_limits]
SPY = 0.75

[risk.symbol_order_notional_limits]
SPY = 1000000000.0

[risk.symbol_order_pct_equity_limits]
SPY = 0.75

[paper]
enabled = true
allow_short = false
require_easy_to_borrow = true
market_data_delay_minutes = 20
lookback_days = 800
client_order_prefix = "geldswg"
rebalance_every_sessions = 21
state_file = "artifacts/paper-daily-v4/rebalance_state.json"
cash_buffer_pct = 0.01
max_universe_age_days = 45
